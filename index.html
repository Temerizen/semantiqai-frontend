<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SemantiqAI</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 40px;
        max-width: 800px;
        margin: auto;
        background: #f7f7f7;
      }

      h1 {
        text-align: center;
      }

      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        box-sizing: border-box;
      }

      button {
        margin-top: 12px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
      }

      #output {
        margin-top: 24px;
        padding: 16px;
        background: #ffffff;
        white-space: pre-wrap;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <h1>SemantiqAI</h1>
    <p>Ask anything.</p>

    <input
      id="prompt"
      type="text"
      placeholder="Type your question..."
    />

    <button onclick="sendPrompt()">Send</button>

    <pre id="output">Response will appear here...</pre>

    <script>
      async function sendPrompt() {
        const prompt = document.getElementById("prompt").value;
        const output = document.getElementById("output");

        if (!prompt.trim()) {
          output.textContent = "Please enter a prompt.";
          return;
        }

        output.textContent = "Thinking...";

        try {
          const response = await fetch("https://semantiqai-backend-production.up.railway.app/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt })
          });

          const text = await response.text();

          try {
            const data = JSON.parse(text);

            if (!response.ok) {
              output.textContent = data.error || "Something went wrong.";
              return;
            }

            output.textContent = data.response || "No response returned.";
          } catch {
            output.textContent = "Backend returned non-JSON:\n\n" + text;
          }

        } catch (error) {
          output.textContent = "Request failed: " + error.message;
        }
      }
    </script>
  </body>
</html>
