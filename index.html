<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SemantiqAI</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121933;
        --panel-2: #182242;
        --text: #eef2ff;
        --muted: #a8b3cf;
        --border: #2a3766;
        --accent: #7c5cff;
        --accent-2: #5eead4;
        --user: #24345f;
        --assistant: #141c38;
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background:
          radial-gradient(circle at top, #17214a 0%, #0b1020 45%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.03em;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
      }

      .badge {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(124, 92, 255, 0.16);
        color: #dcd2ff;
        border: 1px solid rgba(124, 92, 255, 0.4);
        font-size: 13px;
        white-space: nowrap;
      }

      .chat-shell {
        background: rgba(18, 25, 51, 0.86);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      .messages {
        height: 62vh;
        overflow-y: auto;
        padding: 20px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
          transparent;
      }

      .empty-state {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        padding: 20px;
      }

      .empty-state .orb {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 35%, var(--accent-2), var(--accent));
        filter: blur(0.2px);
        box-shadow: 0 0 35px rgba(124, 92, 255, 0.45);
      }

      .message-row {
        display: flex;
        margin-bottom: 14px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        max-width: min(78%, 720px);
        padding: 14px 16px;
        border-radius: 18px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-wrap: break-word;
        border: 1px solid var(--border);
      }

      .message-row.user .bubble {
        background: linear-gradient(180deg, #2b3f74, var(--user));
        border-bottom-right-radius: 6px;
      }

      .message-row.assistant .bubble {
        background: linear-gradient(180deg, #1a254a, var(--assistant));
        border-bottom-left-radius: 6px;
      }

      .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .composer {
        border-top: 1px solid var(--border);
        background: rgba(10, 15, 31, 0.75);
        padding: 14px;
      }

      .composer-inner {
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      .input-wrap {
        flex: 1;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px 12px;
      }

      textarea {
        width: 100%;
        resize: none;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        min-height: 28px;
        max-height: 180px;
      }

      textarea::placeholder {
        color: var(--muted);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        gap: 10px;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 12px 16px;
        background: linear-gradient(180deg, #8a6cff, var(--accent));
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.12s ease, opacity 0.12s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        color: #ffb4b4;
      }

      .typing {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      .typing span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c8d1ff;
        animation: bounce 1s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        0%, 80%, 100% {
          transform: scale(0.8);
          opacity: 0.5;
        }
        40% {
          transform: scale(1.05);
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        .app {
          padding: 14px 10px 24px;
        }

        .brand h1 {
          font-size: 28px;
        }

        .messages {
          height: 58vh;
          padding: 14px;
        }

        .bubble {
          max-width: 88%;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <h1>SemantiqAI</h1>
          <p>Your live intelligence interface.</p>
        </div>
        <div class="badge">Live AI Online</div>
      </div>

      <div class="chat-shell">
        <div id="messages" class="messages">
          <div id="emptyState" class="empty-state">
            <div>
              <div class="orb"></div>
              <h2 style="margin: 0 0 8px;">Ask anything</h2>
              <p style="margin: 0;">Strategy, ideas, learning, execution, writing, planning. It’s all wired up now.</p>
            </div>
          </div>
        </div>

        <div class="composer">
          <div class="composer-inner">
            <div class="input-wrap">
              <textarea
                id="prompt"
                placeholder="Message SemantiqAI..."
                rows="1"
              ></textarea>
              <div class="controls">
                <div class="hint">Enter to send • Shift+Enter for a new line</div>
              </div>
            </div>
            <button id="sendBtn" onclick="sendPrompt()">Send</button>
          </div>
          <div id="status" class="status"></div>
        </div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "https://semantiqai-backend-production.up.railway.app/";
      const messagesEl = document.getElementById("messages");
      const promptEl = document.getElementById("prompt");
      const statusEl = document.getElementById("status");
      const sendBtn = document.getElementById("sendBtn");
      const emptyStateEl = document.getElementById("emptyState");

      function autoResizeTextarea() {
        promptEl.style.height = "auto";
        promptEl.style.height = Math.min(promptEl.scrollHeight, 180) + "px";
      }

      function hideEmptyState() {
        if (emptyStateEl) {
          emptyStateEl.style.display = "none";
        }
      }

      function addMessage(role, content, isHtml = false) {
        hideEmptyState();

        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = role === "user" ? "You" : "SemantiqAI";

        const body = document.createElement("div");
        if (isHtml) {
          body.innerHTML = content;
        } else {
          body.textContent = content;
        }

        bubble.appendChild(label);
        bubble.appendChild(body);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        return { row, bubble, body };
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message || "";
        statusEl.className = isError ? "status error" : "status";
      }

      async function sendPrompt() {
        const prompt = promptEl.value.trim();
        if (!prompt) {
          setStatus("Please enter a prompt.", true);
          return;
        }

        addMessage("user", prompt);
        promptEl.value = "";
        autoResizeTextarea();
        setStatus("");
        sendBtn.disabled = true;

        const thinkingMessage = addMessage(
          "assistant",
          '<div class="typing"><span></span><span></span><span></span></div>',
          true
        );

        try {
          const response = await fetch(BACKEND_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt })
          });

          const text = await response.text();

          try {
            const data = JSON.parse(text);

            if (!response.ok) {
              thinkingMessage.body.textContent = data.error || "Something went wrong.";
              setStatus("Request returned an error.", true);
              return;
            }

            thinkingMessage.body.textContent = data.response || "No response returned.";
            setStatus("");
          } catch {
            thinkingMessage.body.textContent = "Backend returned non-JSON:\n\n" + text;
            setStatus("Backend response format was invalid.", true);
          }
        } catch (error) {
          thinkingMessage.body.textContent = "Request failed: " + error.message;
          setStatus("Network request failed.", true);
        } finally {
          sendBtn.disabled = false;
          messagesEl.scrollTop = messagesEl.scrollHeight;
          promptEl.focus();
        }
      }

      promptEl.addEventListener("input", autoResizeTextarea);

      promptEl.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendPrompt();
        }
      });

      autoResizeTextarea();
    </script>
  </body>
</html>
