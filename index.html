<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SemantiqAI</title>
  </head>
  <body style="font-family: Arial, sans-serif; padding: 40px; max-width: 800px; margin: auto;">
    <h1>SemantiqAI</h1>
    <p>Ask anything.</p>

    <input
      id="prompt"
      type="text"
      placeholder="Type your question..."
      style="width: 100%; padding: 12px; font-size: 16px; box-sizing: border-box;"
    />

    <button
      onclick="sendPrompt()"
      style="margin-top: 12px; padding: 12px 20px; font-size: 16px; cursor: pointer;"
    >
      Send
    </button>

    <pre
      id="output"
      style="margin-top: 24px; padding: 16px; background: #f4f4f4; white-space: pre-wrap; border-radius: 8px;"
    >Response will appear here...</pre>

   <script>
  async function sendPrompt() {
    const prompt = document.getElementById("prompt").value;
    const output = document.getElementById("output");

    if (!prompt.trim()) {
      output.textContent = "Please enter a prompt.";
      return;
    }

    output.textContent = "Thinking...";

    try {
      const response = await fetch("https://semantiqai-backend-production.up.railway.app/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const text = await response.text();

      try {
        const data = JSON.parse(text);
        if (!response.ok) {
          output.textContent = data.error || "Something went wrong.";
          return;
        }
        output.textContent = data.response || "No response returned.";
      } catch {
        output.textContent = "Backend returned non-JSON:\n\n" + text;
      }
    } catch (error) {
      output.textContent = "Request failed: " + error.message;
    }
  }
</script>
  </body>
</html>
